server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Dashboard ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Flask backend ─────────────────────────────────────────
    # The dashboard calls http://<host>:5000/predict directly (Raspberry Pi
    # mode).  In Docker the backend is reachable at http://backend:5000.
    # We expose /api/* so the dashboard JS can also hit /api/predict and
    # /api/health without cross-origin issues when running locally.
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
